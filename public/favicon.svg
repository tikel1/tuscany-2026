<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Tuscany 2026 favicon — ONE bold cypress, sized to actually read
    at browser-tab favicon sizes (16×16 and 20×20). Three smaller
    cypresses look great at 64×64 but collapse into a coloured blob
    at 16×16 because each silhouette is only ~1.5px wide. A single
    dominant cypress that fills most of the icon is the only thing
    that survives that scale.

    Design choices:
    - Sharp pointed apex (cubic Bezier control points cx == apex x
      so both sides arrive vertical → clean angular peak).
    - Slight outward bulge in the lower third so the silhouette
      reads as "tree" not "obelisk".
    - Cypress base sits on a low terracotta ridge for context;
      the ridge curve also doubles as visual weight at the bottom
      so the icon feels grounded, not floating.
    - Cream silhouette on terracotta sky gives high contrast in
      both light and dark browser chromes.
  -->

  <!-- Sky: warm Tuscan terracotta (matches brand --color-terracotta-500) -->
  <rect width="64" height="64" fill="#C45A3D"/>

  <!-- Ridge / hill, deeper terracotta -->
  <path d="M-2,54 Q32,48 66,54 L66,66 L-2,66 Z" fill="#8B3622"/>

  <!-- The cypress — wide enough to be visible at 16×16 (~6px wide
       at the base and ~14px tall at that scale). -->
  <path d="M21,54 C18,42 32,14 32,4 C32,14 46,42 43,54 Z" fill="#F5EFE0"/>
</svg>
