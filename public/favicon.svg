<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Tuscany 2026 favicon — three cypress trees on a Tuscan ridge,
    echoing the famous Cipressi di San Quirico d'Orcia in Val d'Orcia.
    The square terracotta background (rather than a circle on
    transparent) makes the icon look good whether the OS leaves it
    square (browser tab), crops it round (Android maskable home
    screen), or sits it on white (iOS home screen).
    Designed to read clearly all the way down to 16×16.
  -->

  <!-- Sky: warm Tuscan terracotta (matches brand --color-terracotta-500) -->
  <rect width="64" height="64" fill="#C45A3D"/>

  <!-- Rolling hill in deeper terracotta -->
  <path d="M-2,50 Q32,40 66,50 L66,66 L-2,66 Z" fill="#8B3622"/>

  <!-- Three cypress silhouettes — pointier than ellipses so they
       read as cypresses, not as eggs. Cream against terracotta
       gives high contrast at every favicon size. -->
  <path d="M16,52 C13,52 13,28 16,24 C19,28 19,52 16,52 Z" fill="#F5EFE0"/>
  <path d="M32,52 C28,52 28,18 32,14 C36,18 36,52 32,52 Z" fill="#F5EFE0"/>
  <path d="M48,52 C45,52 45,30 48,26 C51,30 51,52 48,52 Z" fill="#F5EFE0"/>
</svg>
