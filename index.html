<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v= bumps when icons change. Full-bleed 512px art + manifest
         purpose any maskable so Android does not letterbox on white;
         slight center zoom keeps saturated pixels at the circular mask. -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-tuscany-192.png?v=7" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-tuscany.png?v=7" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C45A3D" />

    <!-- Installable web app: lets Android Chrome fire `beforeinstallprompt`
         and gives the saved-to-home-screen launcher a name + icon. -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- iOS Safari: Apple ignores the manifest, so these meta tags are how
         we get a clean home-screen icon, a custom short label, and a
         standalone (chrome-less) launch experience. -->
    <link rel="apple-touch-icon" href="./icon-tuscany.png?v=7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tuscany '26" />

    <title>Tuscany 2026 — The Horowitz × Racz × Kaplan Families</title>
    <meta
      name="description"
      content="Ten days in Tuscany, north to south, 17–26 August 2026 — the Horowitz, Racz and Kaplan families' itinerary, map, stays, attractions and tips."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://tikel1.github.io/tuscany-2026/" />

    <!-- Open Graph (WhatsApp, Facebook, iMessage, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tuscany 2026" />
    <meta property="og:url" content="https://tikel1.github.io/tuscany-2026/" />
    <meta property="og:title" content="Tuscany 2026 — The Horowitz × Racz × Kaplan Families" />
    <meta
      property="og:description"
      content="Ten days in Tuscany, north to south, 17–26 August 2026. Itinerary, map, stays and tips for our family adventure."
    />
    <meta property="og:image" content="https://tikel1.github.io/tuscany-2026/images/stay-larciano-sunflowers.png" />
    <meta property="og:image:secure_url" content="https://tikel1.github.io/tuscany-2026/images/stay-larciano-sunflowers.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="680" />
    <meta property="og:image:alt" content="A field of sunflowers below the family's villa in Larciano, Tuscany." />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="he_IL" />

    <!-- Twitter / X (also used as a fallback by some clients) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tuscany 2026 — The Horowitz × Racz × Kaplan Families" />
    <meta
      name="twitter:description"
      content="Ten days in Tuscany, north to south, 17–26 August 2026. Itinerary, map, stays and tips for our family adventure."
    />
    <meta name="twitter:image" content="https://tikel1.github.io/tuscany-2026/images/stay-larciano-sunflowers.png" />
    <meta name="twitter:image:alt" content="A field of sunflowers below the family's villa in Larciano, Tuscany." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Rubik:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Microsoft Clarity (anonymous heatmaps + session recordings).
         The IIFE just queues a `clarity()` shim and async-loads the
         real tag, so it never blocks rendering. Project IDs are
         public-facing identifiers (visible in any visitor's
         devtools), safe to commit. -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wpby5f780u");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
